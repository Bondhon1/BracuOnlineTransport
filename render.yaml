# Render Blueprint — deploy with: New + > Blueprint, then point at this repo.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: university-transport-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: FLASK_DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      # ---- Database (set these to your external free MySQL) ----
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        value: "3306"
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DB
        sync: false
      # ---- Email via Brevo HTTP API (recommended on free tier) ----
      - key: BREVO_API_KEY
        sync: false
      - key: MAIL_SENDER
        sync: false
      - key: MAIL_SENDER_NAME
        value: University Transport System
